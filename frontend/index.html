<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <!-- Left Side - Banner Image -->
        <div class="login-left">
            <div class="left-overlay"></div>
            <div class="banner-content">
                <h1 class="banner-title">Construindo com propósito, qualidade e resiliência</h1>
                <div class="banner-divider"></div>
                <p class="banner-subtitle">Soluções que transformam ideias em obras</p>
            </div>
        </div>

        <!-- Right Side -->
        <div class="login-right">
            <div class="login-card" data-testid="auth-login-card">
                <img src="assets/images/logo-ian2.png" alt="Logo Oliveira ERP" class="login-logo">
                <h2 class="card-title" data-testid="auth-login-title">Sign In</h2>

                <form class="login-form" data-testid="auth-login-form" novalidate>
                    <div class="form-group">
                        <label for="email" class="form-label" data-testid="auth-login-label-email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            data-testid="auth-login-input-email"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label" data-testid="auth-login-label-password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            data-testid="auth-login-input-password"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <div class="form-options">
                        <label class="checkbox-wrapper" data-testid="auth-login-remember-wrapper">
                            <input
                                type="checkbox"
                                id="remember"
                                name="remember"
                                class="checkbox-input"
                                data-testid="auth-login-checkbox-remember"
                            >
                            <span class="checkbox-text">Remember me</span>
                        </label>
                        <a href="#" class="forgot-link" data-testid="auth-login-link-forgot">Forgot password</a>
                    </div>

                    <button
                        type="submit"
                        class="submit-button"
                        data-testid="auth-login-button-submit"
                    >
                        Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
