<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Oliveira ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="login-container">
        <!-- Left Side - Banner Image -->
        <div class="login-left">
            <div class="left-overlay"></div>
            <div class="banner-content">
                <h1 class="banner-title">Building with purpose, quality, and resilience</h1>
                <div class="banner-divider"></div>
                <p class="banner-subtitle">Solutions that turn ideas into reality</p>
            </div>
        </div>

        <!-- Right Side -->
        <div class="login-right">
            <div class="login-card" data-testid="auth-register-card">
                <img src="../assets/images/logo-ian2.png" alt="Oliveira ERP logo" class="login-logo">
                <h2 class="card-title" data-testid="auth-register-title">Sign Up</h2>

                <form class="login-form" data-testid="auth-register-form" novalidate>
                    <div class="form-group">
                        <label for="fullname" class="form-label" data-testid="auth-register-label-fullname">Full Name</label>
                        <input
                            type="text"
                            id="fullname"
                            name="fullname"
                            class="form-input"
                            data-testid="auth-register-input-fullname"
                            autocomplete="name"
                            required
                        >
                        <p class="form-text" data-testid="auth-register-error-fullname" data-error aria-live="polite"></p>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label" data-testid="auth-register-label-email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            data-testid="auth-register-input-email"
                            autocomplete="email"
                            required
                        >
                        <p class="form-text" data-testid="auth-register-error-email" data-error aria-live="polite"></p>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label" data-testid="auth-register-label-password">Password</label>
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                data-testid="auth-register-input-password"
                                autocomplete="new-password"
                                required
                            >
                            <button type="button" class="password-toggle" data-testid="auth-register-button-toggle-password" onclick="togglePasswordVisibility()">Show</button>
                        </div>
                        <p class="form-text" data-testid="auth-register-error-password" data-error aria-live="polite"></p>
                    </div>

                    <div class="form-group">
                        <label for="birthdate" class="form-label" data-testid="auth-register-label-birthdate">Birth Date</label>
                        <input
                            type="date"
                            id="birthdate"
                            name="birthdate"
                            class="form-input"
                            data-testid="auth-register-input-birthdate"
                            required
                        >
                        <p class="form-text" data-testid="auth-register-error-birthdate" data-error aria-live="polite"></p>
                    </div>

                    <div class="form-options">
                        <span class="form-text">Already have an account? <a href="login.html" class="forgot-link" data-testid="auth-register-link-login">Sign in</a></span>
                    </div>

                    <button
                        type="submit"
                        class="submit-button"
                        data-testid="auth-register-button-submit"
                    >
                        Sign Up
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="../scripts/shared/auth.js"></script>
    <script src="../scripts/pages/register.js"></script>
</body>
</html>
